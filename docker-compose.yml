version: '3.8'

services:

  # ── Laravel + React App ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tindatrack_app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - APP_NAME=TindaTrack
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=tindatrack
      - DB_USERNAME=postgres
      - DB_PASSWORD=tindatrack123
      - SESSION_DRIVER=database
      - CACHE_DRIVER=file
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tindatrack_network

  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: tindatrack_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tindatrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 126636110059
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tindatrack_network

  # ── pgAdmin ──
  pgadmin:
    image: dpage/pgadmin4
    container_name: tindatrack_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tindatrack.ph
      PGADMIN_DEFAULT_PASSWORD: tindatrack123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - tindatrack_network

volumes:
  postgres_data:

networks:
  tindatrack_network:
    driver: bridge